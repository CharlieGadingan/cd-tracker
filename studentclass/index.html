<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeTracker - GitHub Project Tracking System</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="/frontend/asset/git.png" />
    <link rel="stylesheet" href="/frontend/css/studentclass.css">
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="logo-section">
          <div class="logo-container">
            <div class="logo-icon">
              <img src="/frontend/asset/git.png" alt="Git Logo" class="git-logo" />
            </div>
            <div class="logo-text">
              <div class="brand-name">CodeTracker</div>
              <div class="tagline">GitHub Project Tracking System</div>
            </div>
          </div>
        </div>
        <div class="user-info">
          <div class="user-avatar" id="studentAvatar"></div>
          <div class="user-details">
            <h3 id="studentName">Loading...</h3>
            <p>Student</p>
          </div>
        </div>
      </header>

      <!-- Back to Dashboard Button -->
      <a href="/dashboard/" class="back-to-dashboard" id="backToDashboardBtn">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>

      <main class="dashboard-grid">
        <section class="assignments-column">
          <div id="assignmentsList"></div>
        </section>
      </main>
    </div>

    <!-- Submission Modal -->
    <div class="modal" id="submissionModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>
            <i class="fas fa-paper-plane"></i>
            Submit Repository
          </h2>
          <span class="close-btn" id="closeModal">&times;</span>
        </div>

        <div class="modal-body">
          <div class="assignment-detail" id="modalAssignmentDetail">
            <!-- Will be filled dynamically -->
          </div>

          <form id="submissionForm">
            <div class="form-group">
              <label for="submissionMode">
                <i class="fas fa-code-branch"></i>
                Repository Mode
              </label>
              <select id="submissionMode">
                <option value="existing">Use existing repository</option>
                <option value="new">Create new repository</option>
              </select>
            </div>

            <div class="form-group">
              <label for="githubLink" id="repositoryInputLabel">
                <i class="fab fa-github"></i>
                GitHub Repository Link
              </label>
              <div class="github-input-group">
                <input
                  type="url"
                  id="githubLink"
                  placeholder="https://github.com/username/repository"
                  required
                />
                <button type="button" id="pasteGithubBtn" title="Paste from clipboard">
                  <i class="fas fa-paste"></i>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="submissionNote">
                <i class="fas fa-comment"></i>
                Note (Optional)
              </label>
              <textarea
                id="submissionNote"
                rows="3"
                placeholder="Add a short note about your repository..."
              ></textarea>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" id="cancelSubmitBtn">Cancel</button>
          <button class="btn btn-primary" id="submitAssignmentBtn">
            <i class="fas fa-paper-plane"></i>
            Submit Repository
          </button>
        </div>
      </div>
    </div>

    <script src="/frontend/script/api-client.js"></script>
    <script src="/frontend/script/studentclass.js"></script>
  </body>
</html>

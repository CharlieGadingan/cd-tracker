<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeTracker - Classroom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/frontend/asset/git.png">
    <link rel="stylesheet" href="/frontend/css/studentclass.css">
  </head>
  <body>

    <!-- ── Top Navigation Bar ─────────────────────────────── -->
    <header class="dashboard-header">
      <div class="header-left">
        <div class="logo">
          <i class="fa-brands fa-github"></i>
          <span class="logo-text">CodeTracker</span>
        </div>
        <span class="header-divider"></span>
        <span class="header-label">Classroom</span>
      </div>
      <div class="header-right">
        <span class="student-name-label" id="studentName">Loading...</span>
        <div class="user-avatar" id="studentAvatar"></div>
      </div>
    </header>

    <!-- ── Page Wrapper ───────────────────────────────────── -->
    <div class="page-wrapper">

      <!-- ── Page Top Bar: back + classroom info ─────────── -->
      <div class="page-topbar">
        <a href="../dashboard/" id="backDashboardBtn" class="back-btn">
          <i class="fas fa-arrow-left"></i>
          Back to Dashboard
        </a>
        <div class="classroom-meta">
          <div class="classroom-meta-item">
            <span class="meta-label">Room</span>
            <span class="meta-value" id="classroomInfoName">—</span>
          </div>
          <div class="meta-divider"></div>
          <div class="classroom-meta-item">
            <span class="meta-label">Code</span>
            <strong class="meta-value accent" id="classroomInfoCode">—</strong>
          </div>
        </div>
      </div>

      <!-- ── Stats Row ───────────────────────────────────── -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon neutral"><i class="fas fa-list-check"></i></div>
          <div class="stat-body">
            <span class="stat-number" id="assignmentCount">0</span>
            <span class="stat-label">Total</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon danger"><i class="fas fa-code-branch"></i></div>
          <div class="stat-body">
            <span class="stat-number" id="pendingCount">0</span>
            <span class="stat-label">Needs Submission</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon success"><i class="fas fa-check-circle"></i></div>
          <div class="stat-body">
            <span class="stat-number" id="submittedCount">0</span>
            <span class="stat-label">Submitted</span>
          </div>
        </div>
      </div>

      <!-- ── Assignments Section ─────────────────────────── -->
      <div class="assignments-section">

        <!-- Toolbar: title + tabs + filter all on one row -->
        <div class="assignments-toolbar">
          <h2 class="section-heading">
            <i class="fas fa-tasks"></i>
            Assignments
          </h2>

          <div class="toolbar-controls">
            <!-- Tabs -->
            <div class="tab-group">
              <button class="tab-btn active" data-tab="needs-submission">
                <i class="fas fa-code-branch"></i>
                Needs Repo
                <span class="tab-badge" id="tabNeedsCount">0</span>
              </button>
              <button class="tab-btn" data-tab="tracked">
                <i class="fas fa-check-circle"></i>
                Tracked
                <span class="tab-badge" id="tabTrackedCount">0</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Assignment cards render here -->
        <div id="assignmentsList">
          <div class="tracked-filter-group" id="trackedFilterGroup">
            <span class="tracked-filter-label">Tracked filter:</span>
            <button class="tracked-filter-btn active" data-tracked-filter="ALL">All</button>
            <button class="tracked-filter-btn" data-tracked-filter="SUBMITTED">Has Submitted</button>
            <button class="tracked-filter-btn" data-tracked-filter="NOT_SUBMITTED">Not Submitted</button>
            <button class="tracked-filter-btn" data-tracked-filter="GRADED">Graded</button>
          </div>
          <div id="activitiesContainer" class="activities-container"></div>
        </div>

      </div>
    </div><!-- end page-wrapper -->

    <!-- ── Submission Modal ──────────────────────────────── -->
    <div class="modal" id="submissionModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2><i class="fas fa-paper-plane"></i> Submit Assignment</h2>
          <button class="close-btn" id="closeModal" aria-label="Close">&times;</button>
        </div>

        <div class="modal-body">
          <div class="assignment-detail" id="modalAssignmentDetail"></div>

          <form id="submissionForm">
            <div class="form-group">
              <label for="submissionMode">
                <i class="fas fa-code-branch"></i> Submission Type
              </label>
              <select id="submissionMode">
                <option value="" disabled hidden>— Select submission type —</option>
                <option value="existing">Submit existing repository</option>
                <option value="new">Create and submit new repository</option>
              </select>
            </div>

            <div class="form-group" id="repoInputGroup">
              <div id="existingRepoGroup" class="repo-input-variant" style="display:none;">
                <label for="repoSelect">
                  <i class="fab fa-github"></i> Select Repository
                  <span class="repo-hint">
                    <i class="fas fa-circle-question"></i>
                    <span class="repo-hint-tooltip">Wait 5–10 seconds to load all repositories from GitHub</span>
                  </span>
                </label>
                <select id="repoSelect">
                  <option value="">— Select a repository —</option>
                </select>
              </div>
              <div id="newRepoGroup" class="repo-input-variant" style="display:none;">
                <label for="repositoryName">
                  <i class="fas fa-folder-plus"></i> Repository Name
                </label>
                <input
                  type="text"
                  id="repositoryName"
                  placeholder="my-awesome-project"
                  pattern="[a-zA-Z0-9_\-]+"
                  title="Letters, numbers, hyphens, underscores only"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="submissionNote">
                <i class="fas fa-comment"></i> Note <span class="label-optional">(Optional)</span>
              </label>
              <textarea id="submissionNote" rows="3" placeholder="Add a short note about your submission..."></textarea>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" id="cancelSubmitBtn">Cancel</button>
          <button class="btn btn-primary" id="submitAssignmentBtn">
            <i class="fas fa-paper-plane"></i> Submit Assignment
          </button>
        </div>
      </div>
    </div>

    <div class="modal" id="activityDetailsModal">
      <div class="modal-content details-modal-content">
        <div class="modal-header">
          <h2><i class="fas fa-circle-info"></i> Activity Details</h2>
          <button class="close-btn" id="closeActivityDetailsModal" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body" id="activityDetailsContent"></div>
      </div>
    </div>

    <script src="/frontend/script/api-client.js"></script>
    <script src="/frontend/script/studentclass.js"></script>
  </body>
</html>

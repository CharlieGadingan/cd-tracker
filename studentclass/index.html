<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeTracker - GitHub Project Tracking System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/frontend/asset/git.png">
    <link rel="stylesheet" href="/frontend/css/studentclass.css">
  </head>
  <body>

    <header class="dashboard-header">
        <div class="header-left">
            <div class="logo">
                <i class="fa-brands fa-github"></i>
                <span class="logo-text">CodeTracker</span>
            </div>
            <span class="header-divider"></span>
            <span class="header-label" id="welcomeMsg">Classroom</span>
        </div>

        <div class="header-right">
            

            <div class="profile">
                     <span class="student-name-label" id="studentName">Loading...</span>
                <div class="user-avatar" id="studentAvatar"></div>

            </div>
        </div>
    </header>

<div class="main-layout">
        <!-- Left Column -->
        <div class="left-column">
            <div class="top-bar-row">
    <div class="back-to-dashboard">
        <a href="../dashboard/" id="backDashboardBtn">
            <i class="fas fa-arrow-left"></i>
            Back to Dashboard
        </a>
    </div>
    <span class="top-bar-spacer"></span>

    <div class="classroom-info-name-card">
        <span class="classroom-info-label">Room name:</span>
        <span id="classroomInfoName">—</span>
    </div>
    <div class="classroom-info-code-card">
        <span class="classroom-info-label">Classcode:</span>
        <strong id="classroomInfoCode">—</strong>
    </div>
</div>
            <div class="section">
    <div class="section-header">
        <div class="assignment-summary-row">
            <div class="summary-chip">
                <i class="fas fa-list-check"></i>
                Showing: <strong id="assignmentCount">0</strong>
            </div>
            <div class="summary-chip pending">
        <i class="fas fa-code-branch"></i>
        Needs repository submission: <strong id="pendingCount">0</strong>
    </div>
    <div class="summary-chip submitted-chip">
        <i class="fas fa-check-circle"></i>
        Repository submitted: <strong id="submittedCount">0</strong>
    </div>
        </div>
    </div>
    <!-- This is YOUR existing container, leave this exactly as it is -->
<!-- THIS OUTER DIV STAYS EXACTLY AS YOU ALREADY HAVE IT -->

</div>
              
        </div>

        <!-- Right Column -->
        <div class="right-column">
            <!-- Students Section -->
            <div class="students-section">
                <div class="section-header assignments-header">
    <h3 class="section-title">
        <i class="fas fa-tasks"></i>
        Classroom Assignments
    </h3>
    <p class="section-subtitle">Assignments that need your attention, including repository submission status.</p>
    <div class="assignment-filters">
        <select id="activityStatusFilter" aria-label="Filter activities by status">
            <option value="ALL">All assignments</option>
            <option value="PUBLISHED">Published</option>
            <option value="CLOSED">Closed</option>
            <option value="NEEDS_SUBMISSION">Needs repository submission</option>
        </select>
    </div>
</div>
            </div>
            
        </div>
    </div>

    <div id="assignmentsList">

    <!-- Just replace everything inside with this -->
    <div class="activities-grid">
        <div id="unsubmittedAssignments" class="activities-column"></div>
        <div class="activities-divider"></div>
        <div id="submittedAssignments" class="activities-column"></div>
    </div>

</div>
    <!-- Submission Modal -->
    <div class="modal" id="submissionModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>
            <i class="fas fa-paper-plane"></i>
            Submit Assignment
          </h2>
          <span class="close-btn" id="closeModal">&times;</span>
        </div>

        <div class="modal-body">
          <div class="assignment-detail" id="modalAssignmentDetail">
            <!-- Will be filled dynamically -->
          </div>

          <form id="submissionForm">
            <div class="form-group">
  <label for="submissionMode">
    <i class="fas fa-code-branch"></i>
    Submission Type
  </label>
  <select id="submissionMode">
    <option value="" disabled hidden>— Select submission type —</option>
    <option value="existing">Submit existing repository</option>
    <option value="new">Create and submit new repository</option>
</select>
</div>

<div class="form-group" id="repoInputGroup">
  <!-- For existing repos -->
  <div id="existingRepoGroup" class="repo-input-variant" style="display: none;">
    <label for="repoSelect">
      <i class="fab fa-github"></i>
      Select Repository
      <span class="repo-hint">
        <i class="fas fa-circle-question"></i>
        <span class="repo-hint-tooltip">Wait about 5–10 seconds to load all of your repositories from GitHub</span>
      </span>
    </label>
    <select id="repoSelect">
      <option value="">— Select a repository —</option>
    </select>
  </div>
  <!-- For new repos -->
  <div id="newRepoGroup" class="repo-input-variant" style="display: none;">
    <label for="repositoryName">
      <i class="fas fa-folder-plus"></i>
      Repository Name
    </label>
    <input
      type="text"
      id="repositoryName"
      placeholder="my-awesome-project"
      pattern="[a-zA-Z0-9_\\-]+"
      title="Repository name can contain letters, numbers, hyphens, and underscores"
    />
  </div>
</div>

            <div class="form-group">
              <label for="submissionNote">
                <i class="fas fa-comment"></i>
                Note (Optional)
              </label>
              <textarea
                id="submissionNote"
                rows="3"
                placeholder="Add a short note about your submission..."
              ></textarea>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" id="cancelSubmitBtn">Cancel</button>
          <button class="btn btn-primary" id="submitAssignmentBtn">
            <i class="fas fa-paper-plane"></i>
            Submit Assignment
          </button>
        </div>
      </div>
    </div>

    <script src="/frontend/script/api-client.js"></script>
    <script src="/frontend/script/studentclass.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeTracker - GitHub Project Tracking System</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="/frontend/asset/git.png" />
    <link rel="stylesheet" href="/frontend/css/studentclass.css">
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="logo-section">
          <div class="logo-container">
            <div class="logo-icon">
              <img src="/frontend/asset/git.png" alt="Git Logo" class="git-logo" />
            </div>
            <div class="logo-text">
              <div class="brand-name">CodeTracker</div>
              <div class="tagline">GitHub Project Tracking System</div>
            </div>
          </div>
        </div>
        <div class="user-info">
          <div class="user-avatar" id="studentAvatar"></div>
          <div class="user-details">
            <h3 id="studentName">Loading...</h3>
            <p>Student</p>
          </div>
        </div>
      </header>

      <!-- Back to Dashboard Button -->
      <a href="/dashboard/" class="back-to-dashboard" id="backToDashboardBtn">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>

      <!-- Today's Date Badge -->
      <div class="date-badge">
        <i class="fas fa-calendar-day"></i>
        Today's Date: <strong>March 5, 2026</strong>
      </div>

      <!-- Main Dashboard Grid -->
      <div class="dashboard-grid">
        <div class="assignments-column">
          <div class="section-header assignments-header">
            <div>
              <h3 class="section-title">
                <i class="fas fa-tasks"></i>
                Classroom Assignments
              </h3>
              <p class="section-subtitle">Assignments that need your attention, including repository submission status.</p>
            </div>
            <div class="assignment-filters">
              <select id="activityStatusFilter" aria-label="Filter activities by status">
                <option value="ALL">All assignments</option>
                <option value="PUBLISHED">Published</option>
                <option value="CLOSED">Closed</option>
                <option value="NEEDS_SUBMISSION">Needs repository submission</option>
              </select>
            </div>
          </div>

          <div class="assignment-summary-row">
            <div class="summary-chip">
              <i class="fas fa-list-check"></i>
              Showing: <strong id="assignmentCount">0</strong>
            </div>
            <div class="summary-chip pending">
              <i class="fas fa-code-branch"></i>
              Needs repository submission: <strong id="pendingCount">0</strong>
            </div>
          </div>

          <div id="assignmentsList"></div>
        </div>
      </div>
    </div>

    <!-- Submission Modal -->
    <div class="modal" id="submissionModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>
            <i class="fas fa-paper-plane"></i>
            Submit Assignment
          </h2>
          <span class="close-btn" id="closeModal">&times;</span>
        </div>

        <div class="modal-body">
          <div class="assignment-detail" id="modalAssignmentDetail">
            <!-- Will be filled dynamically -->
          </div>

          <form id="submissionForm">
            <div class="form-group">
              <label for="submissionMode">
                <i class="fas fa-code-branch"></i>
                Submission Type
              </label>
              <select id="submissionMode">
                <option value="existing">Submit existing repository</option>
                <option value="new">Create and submit new repository</option>
              </select>
            </div>

            <div class="form-group" id="repoInputGroup">
              <!-- For existing repos -->
              <div id="existingRepoGroup" class="repo-input-variant">
                <label for="githubLink">
                  <i class="fab fa-github"></i>
                  GitHub Repository Link
                </label>
                <div class="github-input-group">
                  <input
                    type="url"
                    id="githubLink"
                    placeholder="https://github.com/username/repository"
                    required
                  />
                  <button type="button" id="pasteGithubBtn" title="Paste from clipboard">
                    <i class="fas fa-paste"></i>
                  </button>
                </div>
              </div>
              <!-- For new repos -->
              <div id="newRepoGroup" class="repo-input-variant" style="display: none;">
                <label for="repositoryName">
                  <i class="fas fa-folder-plus"></i>
                  Repository Name
                </label>
                <input
                  type="text"
                  id="repositoryName"
                  placeholder="my-awesome-project"
                  pattern="[a-zA-Z0-9_\\-]+"
                  title="Repository name can contain letters, numbers, hyphens, and underscores"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="submissionNote">
                <i class="fas fa-comment"></i>
                Note (Optional)
              </label>
              <textarea
                id="submissionNote"
                rows="3"
                placeholder="Add a short note about your submission..."
              ></textarea>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" id="cancelSubmitBtn">Cancel</button>
          <button class="btn btn-primary" id="submitAssignmentBtn">
            <i class="fas fa-paper-plane"></i>
            Submit Assignment
          </button>
        </div>
      </div>
    </div>

    <script src="/frontend/script/api-client.js"></script>
    <script src="/frontend/script/studentclass.js"></script>
  </body>
</html>
